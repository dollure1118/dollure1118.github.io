name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            pandoc

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: r-reticulate
          channels: conda-forge
          channel-priority: strict
          auto-activate-base: false
          

      - name: Create Python environment
        run: |
          conda create -n r-reticulate --override-channels -c conda-forge -y \
            python=3.12 \
            pip \
            "expat>=2.7.2" \
            numpy \
            pandas \
            pyarrow \
            matplotlib-base \
            polars \
            plotly \
            scipy \
            statsmodels \
            plotnine \
            seaborn \
            patchworklib \
            ipython

          conda run -n r-reticulate python -m pip install --upgrade pip
          conda run -n r-reticulate python -m pip install --no-deps pybabynames pylahman
          conda run -n r-reticulate python -m pip check

          conda run -n r-reticulate python -c "import pyexpat; print('pyexpat ok')"
          conda run -n r-reticulate python -c "import matplotlib.pyplot as plt; print('matplotlib ok')"
          conda run -n r-reticulate python -c "from plotnine import ggplot; print('plotnine ok')"
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        shell: Rscript {0}
        run: |
          install.packages(c(
            "reticulate", "knitr", "rmarkdown", "tidyverse", "quarto",
            "babynames", "Lahman", "NHANES", "patchwork", "mosaicData",
            "mdsr", "ggplot2", "plotly", "gganimate", "gifski", "transformr",
            "broom", "htmlwidgets", "skimr"   # htmlwidgets 추가
          ))

      - name: Create required directories
        run: |
          mkdir -p figures/bmi_r
          mkdir -p figures/bmi_py
          mkdir -p figures

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          CONDA_BASE=$(conda info --base)
          CONDA_ENV="$CONDA_BASE/envs/r-reticulate"

          export RETICULATE_PYTHON="$CONDA_ENV/bin/python"
          export LD_LIBRARY_PATH="$CONDA_ENV/lib:${LD_LIBRARY_PATH:-}"

          EXPAT_LIB=$(find "$CONDA_ENV/lib" -maxdepth 1 -name "libexpat.so.1*" | sort | head -n 1)
          echo "Using expat: $EXPAT_LIB"
          export LD_PRELOAD="$EXPAT_LIB"

          "$RETICULATE_PYTHON" -c "import pyexpat; print('pyexpat ok')"
          "$RETICULATE_PYTHON" -c "import matplotlib.pyplot as plt; print('matplotlib ok')"
          "$RETICULATE_PYTHON" -c "from plotnine import ggplot; print('plotnine ok')"

          quarto render
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages