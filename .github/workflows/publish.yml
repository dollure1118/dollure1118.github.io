name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

        shell: bash -l {0}
      - name: Install Python dependencies via Conda
        run: |
          conda install -n r-reticulate -c conda-forge \
            python=3.12 \
            pip \
            "numpy>=2.4.0" \
            "pandas>=2.3.3" \
            "pyarrow>=22.0.0" \
            matplotlib polars plotly scipy statsmodels plotnine \
            -y

          conda run -n r-reticulate python -m pip install --upgrade pip
          conda run -n r-reticulate python -m pip install --no-deps pybabynames pylahman
          conda run -n r-reticulate python -m pip check
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("reticulate", "knitr", "rmarkdown", "tidyverse", "quarto", "babynames", "Lahman", "NHANES", "patchwork", "mosaicData", "mdsr", "ggplot2", "plotly", "gganimate", "gifski", "transformr", "broom"))
        # 추가로 필요한 패키지 설치
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          export RETICULATE_PYTHON=$(conda info --base)/envs/r-reticulate/bin/python
          quarto render
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
