name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            pandoc

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: r-reticulate
          channels: conda-forge,defaults
          channel-priority: strict

      - name: Install Python dependencies via Conda
        shell: bash -l {0}
        run: |
          conda install -n r-reticulate --override-channels -c conda-forge \
            python=3.12 \
            pip \
            expat \
            numpy pandas pyarrow \
            matplotlib polars plotly scipy statsmodels plotnine \
            patchworklib \
            seaborn \
            -y

          conda run -n r-reticulate python -m pip install --upgrade pip
          # --no-deps 제거: 의존성 포함 설치
          conda run -n r-reticulate python -m pip install pybabynames pylahman
          conda run -n r-reticulate python -m pip check

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        shell: Rscript {0}
        run: |
          install.packages(c(
            "reticulate", "knitr", "rmarkdown", "tidyverse", "quarto",
            "babynames", "Lahman", "NHANES", "patchwork", "mosaicData",
            "mdsr", "ggplot2", "plotly", "gganimate", "gifski", "transformr",
            "broom", "htmlwidgets"   # htmlwidgets 추가
          ))

      - name: Create required directories
        run: |
          mkdir -p figures/bmi_r
          mkdir -p figures/bmi_py
          mkdir -p figures

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        shell: bash -l {0}
        run: |
          CONDA_BASE=$(conda info --base)
          export RETICULATE_PYTHON="${CONDA_BASE}/envs/r-reticulate/bin/python"
          quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages